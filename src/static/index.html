<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Knowledge Base RAG</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <!-- 侧边栏 -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>Personal KB</h2>
      <button id="sidebar-toggle" title="折叠侧边栏">&lt;</button>
    </div>

    <div class="sidebar-section">
      <h3>检索配置</h3>
      <div class="config-group">
        <label>Chunk Size <span id="val-chunk_size">500</span></label>
        <input type="range" id="cfg-chunk_size" min="100" max="2000" value="500" step="50">
      </div>
      <div class="config-group">
        <label>Chunk Overlap <span id="val-chunk_overlap">50</span></label>
        <input type="range" id="cfg-chunk_overlap" min="0" max="500" value="50" step="10">
      </div>
      <div class="config-group">
        <label>Top-K <span id="val-top_k">8</span></label>
        <input type="range" id="cfg-top_k" min="1" max="30" value="8" step="1">
      </div>
      <div class="config-group">
        <label>Rerank Top-N <span id="val-rerank_top_n">3</span></label>
        <input type="range" id="cfg-rerank_top_n" min="1" max="15" value="3" step="1">
      </div>
      <div class="config-group">
        <label>Temperature <span id="val-temperature">0.7</span></label>
        <input type="range" id="cfg-temperature" min="0" max="2" value="0.7" step="0.1">
      </div>
      <div class="config-group">
        <label>Threshold <span id="val-relevance_threshold">0.3</span></label>
        <input type="range" id="cfg-relevance_threshold" min="0" max="1" value="0.3" step="0.05">
      </div>
      <button id="btn-save-config" class="btn-config">应用配置</button>
    </div>

    <div class="sidebar-section">
      <h3>已入库文档</h3>
      <div id="file-list" class="file-list">
        <p class="placeholder">暂无文档</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <button id="btn-export" class="btn-export">导出对话 (MD)</button>
      <button id="btn-clear-chat" class="btn-clear">清空对话</button>
    </div>
  </aside>

  <!-- 主区域 -->
  <main id="main">
    <header id="topbar">
      <h1>Personal Knowledge Base RAG</h1>
      <span class="subtitle">基于 RAG 技术的个人知识库智能问答系统</span>
    </header>

    <!-- 文件上传区 -->
    <section id="upload-zone" class="upload-area">
      <div class="upload-drop" id="upload-drop">
        <span class="upload-icon">+</span>
        <p>拖拽文件至此，或点击上传</p>
        <p class="upload-hint">支持 PDF / TXT / MD (最大 20MB)</p>
        <input type="file" id="file-input" accept=".pdf,.txt,.md" hidden>
      </div>
      <div id="upload-status" class="upload-status hidden"></div>
    </section>

    <!-- 对话区 -->
    <section id="chat-area" class="chat-area">
      <div id="chat-messages" class="chat-messages">
        <div class="welcome-message">
          <p>上传文档后开始提问，支持多轮对话和复合问题</p>
          <p class="welcome-hint">例："A是什么，它的特点是什么"</p>
        </div>
      </div>
    </section>

    <!-- 输入区 -->
    <section id="input-area" class="input-area">
      <div class="input-row">
        <textarea id="chat-input" placeholder="输入你的问题..." rows="1" autofocus></textarea>
        <button id="btn-send" class="btn-send" title="发送">
          <span class="send-icon">&uarr;</span>
        </button>
      </div>
    </section>
  </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
